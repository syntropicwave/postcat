name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # rquickjs-sys needs GNU patch; on Windows it ships with Git.
      - name: Add GNU patch to PATH (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri::generate_context! requires frontendDist (../dist) to exist,
      # so the frontend must be built before any cargo command.
      - run: npm ci
      - run: npm run build

      - name: rustfmt
        run: cargo fmt --check
        working-directory: src-tauri
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: tests
        run: cargo test
        working-directory: src-tauri
