<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- transparent background — icon is just the cat + letter, filling the frame -->

  <!-- big triangular ears -->
  <path d="M70 70 L188 448 L452 300 Z" fill="#ff9f38"/>
  <path d="M954 70 L836 448 L572 300 Z" fill="#ff9f38"/>
  <path d="M158 176 L246 420 L420 316 Z" fill="#ffd7ac"/>
  <path d="M866 176 L778 420 L604 316 Z" fill="#ffd7ac"/>

  <!-- big head -->
  <ellipse cx="512" cy="588" rx="428" ry="400" fill="#ff9f38"/>

  <!-- big anime eyes -->
  <g>
    <ellipse cx="360" cy="548" rx="70" ry="86" fill="#2e2016"/>
    <ellipse cx="664" cy="548" rx="70" ry="86" fill="#2e2016"/>
    <circle cx="336" cy="516" r="26" fill="#ffffff"/>
    <circle cx="640" cy="516" r="26" fill="#ffffff"/>
    <circle cx="378" cy="574" r="12" fill="#ffffff"/>
    <circle cx="682" cy="574" r="12" fill="#ffffff"/>
  </g>

  <!-- nose -->
  <path d="M484 616 H540 L512 648 Z" fill="#e0546e"/>

  <!-- fangs gripping the letter -->
  <path d="M486 660 L512 660 L499 690 Z" fill="#ffffff"/>
  <path d="M512 660 L538 660 L525 690 Z" fill="#ffffff"/>

  <!-- big envelope, no heart -->
  <rect x="286" y="666" width="452" height="262" rx="30" fill="#ffffff"/>
  <path d="M286 692 L512 838 L738 692" fill="none" stroke="#e0b789"
        stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
