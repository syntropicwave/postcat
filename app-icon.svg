<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- transparent background — the icon is just the cat + letter -->

  <!-- big cat head silhouette (ears + head), fills the icon edge to edge -->
  <path d="M128 452 L96 96 L430 316 Q512 290 594 316 L928 96 L896 452
           Q928 800 700 908 Q512 1006 324 908 Q96 800 128 452 Z"
        fill="#ff9f38"/>

  <!-- inner ears -->
  <path d="M232 356 L212 168 L404 320 Z" fill="#ffd7ac"/>
  <path d="M792 356 L812 168 L620 320 Z" fill="#ffd7ac"/>

  <!-- happy squint eyes -->
  <g fill="none" stroke="#3f2c1b" stroke-width="44" stroke-linecap="round">
    <path d="M300 506 Q382 432 464 506"/>
    <path d="M560 506 Q642 432 724 506"/>
  </g>

  <!-- nose -->
  <path d="M476 556 H548 L512 592 Z" fill="#e04f6b"/>

  <!-- big envelope held in the mouth -->
  <rect x="300" y="588" width="424" height="268" rx="30" fill="#ffffff"/>
  <path d="M300 614 L512 762 L724 614" fill="none" stroke="#e0b789"
        stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M512 716 c-19 -27 -60 -12 -60 21 c0 25 40 45 60 64
           c20 -19 60 -39 60 -64 c0 -33 -41 -48 -60 -21 Z" fill="#ff5f7a"/>
